name: Backend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests and compile
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.29"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install locked backend dependencies
        run: uv sync --locked --group dev

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+psycopg://invalid:invalid@127.0.0.1:1/invalid
        run: uv run --group dev pytest

      - name: Compile backend
        run: uv run python -m compileall app tests
